name: web-watcher

on:
  schedule:
    - cron: "*/30 * * * *" # toutes les 30 minutes
  workflow_dispatch: {} # déclenchement manuel

permissions:
  contents: write

concurrency:
  group: web-watcher
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci || npm install

      - name: Run monitor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          CONFIDENCE_THRESHOLD: ${{ vars.CONFIDENCE_THRESHOLD }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENWA_URL: ${{ secrets.OPENWA_URL }}
          OPENWA_API_KEY: ${{ secrets.OPENWA_API_KEY }}
          OPENWA_SESSION: ${{ secrets.OPENWA_SESSION }}
          WA_TO: ${{ secrets.WA_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: npm start

      - name: Commit state
        run: |
          git config user.name "web-watcher"
          git config user.email "bot@users.noreply.github.com"
          git add docs/state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
