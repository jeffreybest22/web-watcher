<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Watcher — Veille</title>
  <style>
    :root { --bg:#0f1115; --card:#1a1d25; --line:#2a2e3a; --txt:#e6e8ee; --muted:#9aa0ab; --ok:#22c55e; --wait:#f59e0b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--txt); }
    .wrap { max-width: 820px; margin: 0 auto; padding: 24px 16px 64px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .row { display:flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .label { font-weight: 600; font-size: 16px; }
    .badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .found { background: rgba(34,197,94,.15); color: var(--ok); }
    .watching { background: rgba(245,158,11,.15); color: var(--wait); }
    .summary { color: var(--muted); font-size: 14px; margin: 10px 0 6px; line-height: 1.5; }
    .meta { color: var(--muted); font-size: 12px; }
    a { color: #60a5fa; word-break: break-all; }
    .conf { height: 5px; background: var(--line); border-radius: 999px; overflow: hidden; margin-top: 10px; }
    .conf > i { display:block; height:100%; background: var(--ok); }
    .foot { color: var(--muted); font-size: 12px; margin-top: 24px; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔭 Web Watcher</h1>
    <div class="sub" id="updated">Chargement…</div>
    <div id="list"></div>
    <div class="foot">Mise à jour automatique via GitHub Actions · <a href="https://github.com">repo</a></div>
  </div>
  <script>
    function esc(s){ return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
    function timeago(iso){ if(!iso) return "—"; const d=new Date(iso); return d.toLocaleString('fr-FR'); }
    fetch('./state.json?_=' + Date.now()).then(r => r.json()).then(state => {
      document.getElementById('updated').textContent = 'Dernière vérif : ' + timeago(state.updated_at);
      const list = document.getElementById('list');
      const items = Object.values(state.watches || {});
      if (!items.length) { list.innerHTML = '<div class="card">Aucune veille configurée.</div>'; return; }
      list.innerHTML = items.map(w => {
        const found = w.status === 'found';
        const conf = Math.round((w.confidence||0)*100);
        return `<div class="card">
          <div class="row">
            <div class="label">${esc(w.label)}</div>
            <div class="badge ${found?'found':'watching'}">${found?'✅ TROUVÉ':'⏳ surveille'}</div>
          </div>
          <div class="summary">${esc(w.summary)||'—'}</div>
          ${w.evidence_url?`<div class="meta">🔗 <a href="${esc(w.evidence_url)}" target="_blank">${esc(w.evidence_url)}</a></div>`:''}
          <div class="conf"><i style="width:${conf}%"></i></div>
          <div class="meta" style="margin-top:8px">Confiance ${conf}% · vérifié ${timeago(w.last_checked)}${w.first_found_at?' · trouvé le '+timeago(w.first_found_at):''}</div>
        </div>`;
      }).join('');
    }).catch(e => {
      document.getElementById('updated').textContent = 'Pas encore de données (state.json absent). Lance le moniteur une fois.';
    });
  </script>
</body>
</html>
