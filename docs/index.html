<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Watcher — Veille</title>
  <style>
    :root { --bg:#0f1115; --card:#1a1d25; --line:#2a2e3a; --txt:#e6e8ee; --muted:#9aa0ab; --ok:#22c55e; --wait:#f59e0b; --acc:#60a5fa; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--txt); }
    .wrap { max-width: 820px; margin: 0 auto; padding: 24px 16px 64px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }

    /* Menu */
    .menu { display:flex; gap:8px; margin-bottom: 22px; border-bottom:1px solid var(--line); padding-bottom: 0; }
    .menu button { background:none; border:none; color:var(--muted); font-size:15px; font-weight:600; padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent; }
    .menu button.active { color:var(--txt); border-bottom-color: var(--acc); }
    .menu .spacer { flex:1; }
    .menu .gear { font-size:17px; }

    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .row { display:flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .label { font-weight: 600; font-size: 16px; }
    .badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .found { background: rgba(34,197,94,.15); color: var(--ok); }
    .watching { background: rgba(245,158,11,.15); color: var(--wait); }
    .pending { background: rgba(96,165,250,.15); color: var(--acc); }
    .summary { color: var(--muted); font-size: 14px; margin: 10px 0 6px; line-height: 1.5; }
    .meta { color: var(--muted); font-size: 12px; }
    a { color: var(--acc); word-break: break-all; }
    .conf { height: 5px; background: var(--line); border-radius: 999px; overflow: hidden; margin-top: 10px; }
    .conf > i { display:block; height:100%; background: var(--ok); }
    .foot { color: var(--muted); font-size: 12px; margin-top: 24px; text-align:center; }
    .del { background:none; border:none; cursor:pointer; font-size:15px; opacity:.55; }
    .del:hover { opacity:1; }

    /* Formulaire */
    .field { margin-bottom: 14px; }
    .field label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
    .field .hint { font-weight:400; color:var(--muted); }
    input[type=text], input[type=password], textarea {
      width:100%; background:#12141a; border:1px solid var(--line); border-radius:10px;
      color:var(--txt); padding:10px 12px; font-size:14px; font-family:inherit;
    }
    textarea { min-height: 74px; resize: vertical; }
    input:focus, textarea:focus { outline:none; border-color: var(--acc); }
    .btn { background: var(--acc); color:#0b1020; border:none; border-radius:10px; padding:11px 18px; font-size:15px; font-weight:700; cursor:pointer; }
    .btn:disabled { opacity:.5; cursor:default; }
    .btn.secondary { background:var(--line); color:var(--txt); }
    .msg { margin-top:12px; font-size:14px; padding:10px 12px; border-radius:10px; display:none; }
    .msg.ok { display:block; background:rgba(34,197,94,.12); color:var(--ok); }
    .msg.err { display:block; background:rgba(239,68,68,.12); color:var(--danger); }
    .tokenbox { display:none; }
    .tokenbox.show { display:block; }
    .hidden { display:none; }

    /* Auth */
    #auth { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
    #auth .box { width:100%; max-width:380px; }
    #auth h1 { text-align:center; font-size:24px; margin-bottom:4px; }
    #auth .tag { text-align:center; color:var(--muted); font-size:13px; margin-bottom:22px; }
    #auth .btn { width:100%; margin-top:4px; }
    #auth .link { display:block; text-align:center; margin-top:16px; font-size:13px; cursor:pointer; color:var(--acc); background:none; border:none; width:100%; }
    #app { display:none; }
    .otp-input { text-align:center; letter-spacing:8px; font-size:22px; font-weight:700; }
  </style>
</head>
<body>
  <!-- Écran d'authentification -->
  <div id="auth">
    <div class="box">
      <h1>🔭 Web Watcher</h1>
      <div class="tag">Accès sécurisé</div>

      <!-- Login -->
      <div id="auth-login" class="card">
        <div class="field">
          <label>Email</label>
          <input type="text" id="a-email" value="jeffreybest2@gmail.com" autocomplete="username" />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="a-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
        </div>
        <button class="btn" id="a-login-btn" onclick="doLogin()">Se connecter</button>
        <button class="link" onclick="doForgot()">Mot de passe oublié / premier accès →</button>
        <div class="msg" id="a-msg"></div>
      </div>

      <!-- OTP -->
      <div id="auth-otp" class="card hidden">
        <div class="field">
          <label>Code de vérification <span class="hint">— envoyé par email</span></label>
          <input type="text" inputmode="numeric" maxlength="6" id="a-otp" class="otp-input" placeholder="000000" onkeydown="if(event.key==='Enter')doVerify()" />
        </div>
        <button class="btn" id="a-otp-btn" onclick="doVerify()">Vérifier</button>
        <button class="link" onclick="backToLogin()">← Retour</button>
        <div class="msg" id="a-otp-msg"></div>
      </div>

      <!-- Définir mot de passe -->
      <div id="auth-setpw" class="card hidden">
        <div class="field">
          <label>Nouveau mot de passe <span class="hint">— 8 caractères minimum</span></label>
          <input type="password" id="a-newpw" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div class="field">
          <label>Confirmer</label>
          <input type="password" id="a-newpw2" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSetPw()" />
        </div>
        <button class="btn" id="a-setpw-btn" onclick="doSetPw()">Enregistrer et entrer</button>
        <div class="msg" id="a-setpw-msg"></div>
      </div>
    </div>
  </div>

  <div class="wrap" id="app">
    <h1>🔭 Web Watcher</h1>
    <div class="sub" id="updated">Chargement…</div>

    <nav class="menu">
      <button id="tab-list" class="active" onclick="showTab('list')">📡 Veilles</button>
      <button id="tab-add" onclick="showTab('add')">➕ Ajouter</button>
      <div class="spacer"></div>
      <button class="gear" title="Réglages" onclick="showTab('token')">⚙️</button>
      <button class="gear" title="Déconnexion" onclick="doLogout()">🚪</button>
    </nav>

    <!-- Section liste -->
    <section id="sec-list">
      <div id="list"></div>
    </section>

    <!-- Section ajout -->
    <section id="sec-add" class="hidden">
      <div class="card" style="border-color:#3b4ba0">
        <div class="field">
          <label>✨ Génération IA <span class="hint">— décris ce que tu veux surveiller, l'IA pré-remplit les champs ci-dessous. Vérifie (surtout les URLs) puis valide.</span></label>
          <textarea id="f-ai-prompt" style="min-height:52px" placeholder="Ex: préviens-moi quand Digicel Haïti lance une API publique pour les développeurs"></textarea>
        </div>
        <button class="btn" id="f-ai-btn" onclick="aiGenerate()">✨ Générer</button>
        <div class="msg" id="ai-msg"></div>
      </div>
      <div class="card">
        <div class="field">
          <label>Titre de la veille</label>
          <input type="text" id="f-label" placeholder="Ex: API Digicel disponible pour développeurs" />
        </div>
        <div class="field">
          <label>Question posée à l'IA <span class="hint">— sois précis sur ce qui compte comme « trouvé » (officiel, daté, concret) pour éviter les faux positifs</span></label>
          <textarea id="f-question" placeholder="Ex: Digicel Haïti a-t-il OFFICIELLEMENT annoncé une API publique permettant... ? Réponds 'trouvé' seulement s'il y a une preuve concrète (page officielle, annonce datée), pas une rumeur."></textarea>
        </div>
        <div class="field">
          <label>Sources officielles à surveiller <span class="hint">— une URL par ligne (optionnel)</span></label>
          <textarea id="f-sources" placeholder="https://www.digicelgroup.com/ht&#10;https://..."></textarea>
        </div>
        <div class="field">
          <label>Requêtes de recherche web <span class="hint">— une par ligne, varie les langues/formulations</span></label>
          <textarea id="f-queries" placeholder="Digicel Haïti API développeur&#10;Digicel Haiti developer API 2026"></textarea>
        </div>
        <div class="field">
          <label>Mots-clés indicatifs <span class="hint">— séparés par des virgules (optionnel)</span></label>
          <input type="text" id="f-keywords" placeholder="api, developer, documentation" />
        </div>
        <button class="btn" id="f-submit" onclick="addWatch()">➕ Ajouter la veille</button>
        <div class="msg" id="f-msg"></div>
      </div>
    </section>

    <!-- Section token -->
    <section id="sec-token" class="hidden">
      <div class="card">
        <div class="field">
          <label>Token GitHub (PAT) <span class="hint">— requis pour ajouter/supprimer des veilles depuis cette page. Stocké uniquement dans TON navigateur (localStorage), jamais envoyé ailleurs qu'à api.github.com.</span></label>
          <input type="password" id="f-token" placeholder="ghp_…" />
        </div>
        <div class="field">
          <label>Clé Groq API <span class="hint">— pour le bouton ✨ Générer (pré-remplissage IA). Stockée uniquement dans ce navigateur, envoyée uniquement à api.groq.com.</span></label>
          <input type="password" id="f-groq" placeholder="gsk_…" />
        </div>
        <button class="btn" onclick="saveToken()">Enregistrer</button>
        <button class="btn secondary" onclick="clearToken()" style="margin-left:8px">Effacer</button>
        <div class="msg" id="t-msg"></div>
      </div>
    </section>

    <div class="foot">Vérification auto toutes les 30 min · <a href="https://github.com/jeffreybest22/web-watcher" target="_blank">repo</a> · <a href="https://github.com/jeffreybest22/web-watcher/actions" target="_blank">runs</a></div>
  </div>

  <script>
    const REPO = 'jeffreybest22/web-watcher';
    const API = 'https://api.github.com/repos/' + REPO;
    const AUTH_API = 'https://katdyaspora.com/ww-auth.php';

    // ===================== AUTHENTIFICATION =====================
    function deviceId(){
      let d = localStorage.getItem('ww_device');
      if (!d) { d = 'd_' + Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join(''); localStorage.setItem('ww_device', d); }
      return d;
    }
    function authToken(){ return localStorage.getItem('ww_auth') || ''; }
    let resetToken = null; // mémorisé le temps de définir le mot de passe

    async function authApi(action, extra){
      const r = await fetch(AUTH_API, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action, device_id: deviceId(), ...extra })
      });
      let d = {}; try { d = await r.json(); } catch(e){}
      return { status: r.status, ...d };
    }
    function authMsg(id, cls, text){ const el=document.getElementById(id); el.className='msg '+cls; el.textContent=text; }
    function authView(v){
      for (const x of ['login','otp','setpw']) document.getElementById('auth-'+x).classList.toggle('hidden', x!==v);
    }
    function enterApp(){
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      render();
    }

    async function authGate(){
      if (authToken()) {
        try {
          const r = await authApi('check', { token: authToken() });
          if (r.ok) return enterApp();
        } catch(e){ /* réseau — reste sur login */ }
        localStorage.removeItem('ww_auth');
      }
      document.getElementById('auth').style.display = 'flex';
    }

    async function doLogin(){
      const email = document.getElementById('a-email').value.trim();
      const password = document.getElementById('a-password').value;
      const btn = document.getElementById('a-login-btn');
      if (!password) return authMsg('a-msg','err','Entre ton mot de passe (ou « premier accès »).');
      btn.disabled = true; authMsg('a-msg','ok','Connexion…');
      try {
        const r = await authApi('login', { email, password });
        if (r.ok && r.token) { localStorage.setItem('ww_auth', r.token); return enterApp(); }
        if (r.otp_required) {
          window._authEmail = email; window._setupMode = !!r.setup;
          authView('otp');
          authMsg('a-otp-msg','ok', r.setup ? 'Premier accès : un code a été envoyé à ' + email + '.' : 'Nouvel appareil détecté. Code envoyé à ' + email + '.');
          return;
        }
        authMsg('a-msg','err', r.error || 'Échec de connexion.');
      } catch(e){ authMsg('a-msg','err','Erreur réseau : ' + e.message); }
      finally { btn.disabled = false; }
    }

    async function doForgot(){
      const email = document.getElementById('a-email').value.trim();
      authMsg('a-msg','ok','Envoi du code…');
      try {
        const r = await authApi('forgot', { email });
        if (r.ok) { window._authEmail = email; window._setupMode = true; authView('otp'); authMsg('a-otp-msg','ok','Code envoyé à ' + email + '. Entre-le pour définir un nouveau mot de passe.'); }
        else authMsg('a-msg','err', r.error || 'Impossible d\'envoyer le code.');
      } catch(e){ authMsg('a-msg','err','Erreur réseau : ' + e.message); }
    }

    async function doVerify(){
      const code = document.getElementById('a-otp').value.trim();
      const btn = document.getElementById('a-otp-btn');
      if (code.length < 6) return authMsg('a-otp-msg','err','Entre le code à 6 chiffres.');
      btn.disabled = true; authMsg('a-otp-msg','ok','Vérification…');
      try {
        const r = await authApi('verify-otp', { email: window._authEmail, code });
        if (!r.ok) { authMsg('a-otp-msg','err', r.error || 'Code invalide.'); return; }
        if (r.token) localStorage.setItem('ww_auth', r.token);
        if (r.set_password) { resetToken = r.reset_token; authView('setpw'); authMsg('a-setpw-msg','ok','Choisis ton mot de passe.'); }
        else enterApp();
      } catch(e){ authMsg('a-otp-msg','err','Erreur réseau : ' + e.message); }
      finally { btn.disabled = false; }
    }

    async function doSetPw(){
      const pw = document.getElementById('a-newpw').value;
      const pw2 = document.getElementById('a-newpw2').value;
      const btn = document.getElementById('a-setpw-btn');
      if (pw.length < 8) return authMsg('a-setpw-msg','err','8 caractères minimum.');
      if (pw !== pw2) return authMsg('a-setpw-msg','err','Les deux mots de passe diffèrent.');
      btn.disabled = true; authMsg('a-setpw-msg','ok','Enregistrement…');
      try {
        const r = await authApi('set-password', { reset_token: resetToken, new_password: pw });
        if (r.ok) enterApp();
        else authMsg('a-setpw-msg','err', r.error || 'Échec.');
      } catch(e){ authMsg('a-setpw-msg','err','Erreur réseau : ' + e.message); }
      finally { btn.disabled = false; }
    }

    function backToLogin(){ authView('login'); document.getElementById('a-otp').value=''; }
    async function doLogout(){
      try { await authApi('logout', { token: authToken() }); } catch(e){}
      localStorage.removeItem('ww_auth');
      location.reload();
    }
    // ===========================================================

    function esc(s){ return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
    function timeago(iso){ if(!iso) return "—"; return new Date(iso).toLocaleString('fr-FR'); }
    function token(){ return localStorage.getItem('ww_token') || ''; }
    function groqKey(){ return localStorage.getItem('ww_groq') || ''; }
    function slugify(s){ return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40) || 'veille'; }
    // base64 <-> UTF-8
    function b64decode(b){ return decodeURIComponent(escape(atob(b.replace(/\n/g,'')))); }
    function b64encode(s){ return btoa(unescape(encodeURIComponent(s))); }

    function showTab(t){
      for (const x of ['list','add','token']) {
        document.getElementById('sec-'+x).classList.toggle('hidden', x!==t);
        const tb = document.getElementById('tab-'+x);
        if (tb) tb.classList.toggle('active', x===t);
      }
      if (t==='token') { document.getElementById('f-token').value = token(); document.getElementById('f-groq').value = groqKey(); }
    }

    function ghHeaders(){
      const h = { 'Accept':'application/vnd.github+json' };
      if (token()) h['Authorization'] = 'Bearer ' + token();
      return h;
    }

    // Lit watches.json via l'API contents (à jour, contrairement au CDN raw)
    async function getWatchesFile(){
      const r = await fetch(API + '/contents/watches.json?ref=main&_=' + Date.now(), { headers: ghHeaders() });
      if (!r.ok) throw new Error('GitHub HTTP ' + r.status);
      const d = await r.json();
      return { sha: d.sha, watches: JSON.parse(b64decode(d.content)) };
    }

    async function putWatchesFile(watches, sha, message){
      const r = await fetch(API + '/contents/watches.json', {
        method: 'PUT',
        headers: { ...ghHeaders(), 'Content-Type':'application/json' },
        body: JSON.stringify({ message, sha, content: b64encode(JSON.stringify(watches, null, 2) + '\n'), branch: 'main' })
      });
      if (!r.ok) {
        const e = await r.json().catch(()=>({}));
        throw new Error('Commit refusé (HTTP ' + r.status + ') ' + (e.message||''));
      }
    }

    async function triggerRun(){
      try {
        await fetch(API + '/actions/workflows/monitor.yml/dispatches', {
          method:'POST', headers: { ...ghHeaders(), 'Content-Type':'application/json' },
          body: JSON.stringify({ ref:'main' })
        });
      } catch(e){ /* best effort */ }
    }

    // ---- Liste ----
    async function render(){
      let state = { watches: {} };
      try { state = await (await fetch('./state.json?_=' + Date.now())).json(); } catch(e){}
      let watches = [];
      try { watches = (await getWatchesFile()).watches; }
      catch(e){ watches = Object.values(state.watches||{}); } // fallback si API rate-limitée

      document.getElementById('updated').textContent = state.updated_at ? ('Dernière vérif : ' + timeago(state.updated_at)) : 'En attente du premier passage…';
      const list = document.getElementById('list');
      if (!watches.length) { list.innerHTML = '<div class="card">Aucune veille configurée. Utilise l\'onglet ➕ Ajouter.</div>'; return; }

      list.innerHTML = watches.map(w => {
        const s = (state.watches||{})[w.id] || null;
        const found = s && s.status === 'found';
        const conf = Math.round(((s&&s.confidence)||0)*100);
        const badge = !s ? '<div class="badge pending">🆕 en attente</div>'
          : found ? '<div class="badge found">✅ TROUVÉ</div>' : '<div class="badge watching">⏳ surveille</div>';
        const delBtn = token() ? `<button class="del" title="Supprimer cette veille" onclick="delWatch('${esc(w.id)}')">🗑️</button>` : '';
        return `<div class="card">
          <div class="row">
            <div class="label">${esc(w.label || (s&&s.label) || w.id)}</div>
            <div style="display:flex;align-items:center;gap:8px">${badge}${delBtn}</div>
          </div>
          <div class="summary">${esc((s&&s.summary)||'Sera vérifiée au prochain passage (max 30 min).')}</div>
          ${s&&s.evidence_url?`<div class="meta">🔗 <a href="${esc(s.evidence_url)}" target="_blank">${esc(s.evidence_url)}</a></div>`:''}
          <div class="conf"><i style="width:${conf}%"></i></div>
          <div class="meta" style="margin-top:8px">Confiance ${conf}%${s?' · vérifié '+timeago(s.last_checked):''}${s&&s.first_found_at?' · trouvé le '+timeago(s.first_found_at):''}</div>
        </div>`;
      }).join('');
    }

    // ---- Ajout ----
    function lines(id){ return document.getElementById(id).value.split('\n').map(s=>s.trim()).filter(Boolean); }
    function msg(id, cls, text){ const el=document.getElementById(id); el.className='msg '+cls; el.textContent=text; }

    async function addWatch(){
      const label = document.getElementById('f-label').value.trim();
      const question = document.getElementById('f-question').value.trim();
      if (!label || !question) return msg('f-msg','err','Le titre et la question sont obligatoires.');
      if (!token()) { showTab('token'); return msg('t-msg','err','Ajoute d\'abord ton token GitHub (⚙️) pour pouvoir enregistrer.'); }

      const btn = document.getElementById('f-submit');
      btn.disabled = true; msg('f-msg','ok','Enregistrement…');
      try {
        const { sha, watches } = await getWatchesFile();
        let id = slugify(label), n = 2;
        while (watches.some(w => w.id === id)) id = slugify(label) + '-' + (n++);
        watches.push({
          id, label, question,
          sources: lines('f-sources'),
          search_queries: lines('f-queries').length ? lines('f-queries') : [label],
          keywords: document.getElementById('f-keywords').value.split(',').map(s=>s.trim()).filter(Boolean)
        });
        await putWatchesFile(watches, sha, 'add watch: ' + id);
        await triggerRun();
        msg('f-msg','ok','✅ Veille « ' + label + ' » ajoutée. Un run vient d\'être lancé — verdict d\'ici ~2 min.');
        for (const f of ['f-label','f-question','f-sources','f-queries','f-keywords']) document.getElementById(f).value='';
        render(); setTimeout(()=>showTab('list'), 1200);
      } catch(e) {
        msg('f-msg','err','Erreur : ' + e.message);
      } finally { btn.disabled = false; }
    }

    async function delWatch(id){
      if (!confirm('Supprimer la veille « ' + id + ' » ?')) return;
      try {
        const { sha, watches } = await getWatchesFile();
        await putWatchesFile(watches.filter(w => w.id !== id), sha, 'remove watch: ' + id);
        render();
      } catch(e) { alert('Erreur : ' + e.message); }
    }

    // ---- Génération IA ----
    const AI_SYSTEM = `Tu configures des veilles pour un outil qui surveille le web et alerte quand une information/annonce est publiée. À partir de la demande de l'utilisateur, génère une configuration de veille.

Règles :
- "label" : titre court et clair en français.
- "question" : question STRICTE posée au juge IA à chaque passage. Elle doit exiger une preuve concrète et officielle (annonce datée, page/portail officiel, documentation) et dire explicitement de répondre 'trouvé' seulement dans ce cas, pas pour une rumeur, une vieille info ou un projet futur.
- "sources" : 1 à 4 URLs de sites OFFICIELS très probablement pertinents (accueil du site officiel de l'organisation concernée). Ne mets une URL que si tu es raisonnablement sûr qu'elle existe ; sinon liste vide.
- "search_queries" : 3 à 5 requêtes de recherche web variées (français + anglais, éventuellement espagnol/créole si pertinent, avec et sans année courante).
- "keywords" : 3 à 8 mots-clés indicatifs en minuscules.

Réponds UNIQUEMENT en JSON valide :
{"label": string, "question": string, "sources": string[], "search_queries": string[], "keywords": string[]}`;

    async function aiGenerate(){
      const prompt = document.getElementById('f-ai-prompt').value.trim();
      if (!prompt) return msg('ai-msg','err','Décris d\'abord ce que tu veux surveiller.');
      if (!groqKey()) { showTab('token'); return msg('t-msg','err','Ajoute d\'abord ta clé Groq (gsk_…) pour utiliser la génération IA.'); }
      const btn = document.getElementById('f-ai-btn');
      btn.disabled = true; msg('ai-msg','ok','Génération en cours…');
      try {
        const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method:'POST',
          headers: { 'Authorization':'Bearer ' + groqKey(), 'Content-Type':'application/json' },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            temperature: 0.3,
            response_format: { type:'json_object' },
            messages: [ { role:'system', content: AI_SYSTEM }, { role:'user', content: prompt } ]
          })
        });
        if (!r.ok) throw new Error('Groq HTTP ' + r.status + (r.status===401 ? ' — clé invalide (⚙️)' : ''));
        const d = await r.json();
        const cfg = JSON.parse(d.choices[0].message.content);
        document.getElementById('f-label').value = cfg.label || '';
        document.getElementById('f-question').value = cfg.question || '';
        document.getElementById('f-sources').value = (cfg.sources||[]).join('\n');
        document.getElementById('f-queries').value = (cfg.search_queries||[]).join('\n');
        document.getElementById('f-keywords').value = (cfg.keywords||[]).join(', ');
        msg('ai-msg','ok','✅ Champs pré-remplis. Vérifie-les (surtout les URLs sources), édite si besoin, puis « ➕ Ajouter la veille ».');
      } catch(e) {
        msg('ai-msg','err','Erreur : ' + e.message);
      } finally { btn.disabled = false; }
    }

    // ---- Token ----
    function saveToken(){
      const v = document.getElementById('f-token').value.trim();
      const g = document.getElementById('f-groq').value.trim();
      if (!v && !g) return msg('t-msg','err','Colle au moins un token (ghp_… ou gsk_…).');
      if (v) localStorage.setItem('ww_token', v);
      if (g) localStorage.setItem('ww_groq', g);
      msg('t-msg','ok','✅ Enregistré dans ce navigateur.');
      render(); setTimeout(()=>showTab('list'), 900);
    }
    function clearToken(){ localStorage.removeItem('ww_token'); localStorage.removeItem('ww_groq'); document.getElementById('f-token').value=''; document.getElementById('f-groq').value=''; msg('t-msg','ok','Tokens effacés.'); render(); }

    authGate();
  </script>
